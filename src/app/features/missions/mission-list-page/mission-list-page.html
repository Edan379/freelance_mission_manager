<h1>Liste des missions</h1>

<label>
  Filtrer par statut
  <select [(ngModel)]="selectedStatus">
    <option value="all">Tous</option>
    <option value="draft">Draft</option>
    <option value="sent">Sent</option>
    <option value="accepted">Accepted</option>
    <option value="rejected">Rejected</option>
  </select>
</label>


@for (mission of filteredMissions; track mission.id) {
<article>
  <a [routerLink]="['/missions', mission.id]">
    <h2>{{ mission.title }}</h2>
  </a>
  <p>Client : {{ mission.client }}</p>
  <p>Statut : {{ mission.status }}</p>
  <p>TJM : {{ mission.dailyRate }} $</p>
  <p>Date de début : {{ mission.startDate }}</p>

  <button (click)="deleteMission(mission.id)">
    Supprimer
  </button>
</article>
}

<a routerLink="/missions/new">Créer une mission</a>
